<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadreque Alfeu Zandamela | Portfólio de Engenharia</title>
    <style>
        /* CONFIGURAÇÕES GERAIS - DARK MODE CORPORATIVO */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-top: 64px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* BARRA DE NAVEGAÇÃO */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            z-index: 100;
            height: 64px;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .logo {
            color: #2dd4bf;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: -0.05em;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-links a {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #2dd4bf;
        }
        .nav-links a.btn-nav {
            background-color: #14b8a6;
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .nav-links a.btn-nav:hover {
            background-color: #2dd4bf;
        }

        /* HERO SECTION */
        .hero {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 80px 0;
        }
        .hero-content {
            max-width: 800px;
        }
        .hero-badge {
            display: inline-block;
            background-color: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.2);
            color: #2dd4bf;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 6px 16px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.025em;
            line-height: 1.15;
            color: #ffffff;
        }
        .hero h1 span {
            background: linear-gradient(to right, #2dd4bf, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: #94a3b8;
            font-size: 1.2rem;
            line-height: 1.75;
            margin-bottom: 40px;
        }
        .hero-btns {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-block;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            border-color: #14b8a6;
            color: #14b8a6;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.15);
        }
        .btn-secondary {
            display: inline-block;
            background-color: #1e293b;
            color: #f8fafc;
            padding: 12px 28px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
            border: 1px solid #334155;
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: #334155;
            border-color: #475569;
        }

        /* SEÇÕES - ESTRUTURA */
        .section-padding {
            padding: 96px 0;
        }
        .bg-darker {
            background-color: #020617;
        }
        .border-t-custom {
            border-top: 1px solid #1e293b;
        }
        .section-header {
            margin-bottom: 64px;
        }
        .section-header.center {
            text-align: center;
        }
        .section-tag {
            font-size: 0.75rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #2dd4bf;
            margin-bottom: 8px;
            display: block;
        }
        .section-title {
            font-size: 2.25rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.025em;
        }

        /* CARDS DE COMPETÊNCIAS */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            border-color: rgba(20, 184, 166, 0.4);
            transform: translateY(-6px);
        }
        .card-num {
            width: 48px;
            height: 48px;
            background-color: rgba(20, 184, 166, 0.1);
            color: #2dd4bf;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-weight: bold;
            margin-bottom: 28px;
            font-size: 1.25rem;
        }
        .card.card-db .card-num {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .card.card-dev .card-num {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .card h3 {
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: #ffffff;
        }
        .card p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.65;
            margin-bottom: 28px;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-tag {
            background-color: #1e293b;
            color: #2dd4bf;
            font-size: 0.75rem;
            font-family: monospace;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
        }
        .card.card-db .card-tag { color: #10b981; }
        .card.card-dev .card-tag { color: #3b82f6; }

        /* GRÁFICOS DO GITHUB */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 32px;
        }
        @media (max-width: 550px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
        .metric-card {
            background-color: #020617;
            border: 1px solid #1e293b;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
        }
        .metric-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* TIMELINE DO PERCURSO */
        .timeline-wrapper {
            border-left: 2px solid #1e293b;
            padding-left: 40px;
            margin-left: 8px;
            max-width: 800px;
            margin-top: 16px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 56px;
        }
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        .timeline-dot {
            position: absolute;
            left: -49px;
            top: 4px;
            width: 16px;
            height: 16px;
            background-color: #14b8a6;
            border-radius: 50%;
            border: 4px solid #020617;
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        }
        .timeline-tag {
            font-size: 0.75rem;
            font-family: monospace;
            color: #2dd4bf;
            background-color: rgba(20, 184, 166, 0.1);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 500;
        }
        .timeline-item h3 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 12px;
            margin-bottom: 4px;
            color: #ffffff;
            letter-spacing: -0.025em;
        }
        .timeline-sub {
            font-size: 0.95rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        .timeline-desc {
            color: #64748b;
            font-size: 0.95rem;
        }
