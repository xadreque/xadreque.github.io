<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadreque Alfeu Zandamela | Portfólio de Engenharia</title>
    <style>
        /* ESTILOS GERAIS DAPLICAÇÃO */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* BARRA DE NAVEGAÇÃO */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid #1e293b;
            z-index: 50;
            height: 64px;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .logo {
            color: #2dd4bf;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.15rem;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-links a {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #2dd4bf;
        }
        .nav-links a.btn-nav {
            background-color: #14b8a6;
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
        }
        .nav-links a.btn-nav:hover {
            background-color: #2dd4bf;
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            padding-top: 140px;
            padding-bottom: 80px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            display: flex;
            align-items: center;
        }
        .badge {
            display: inline-block;
            background-color: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.3);
            color: #2dd4bf;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -0.025em;
            line-height: 1.2;
        }
        .hero h1 span {
            color: #2dd4bf;
        }
        .hero p {
            color: #94a3b8;
            font-size: 1.15rem;
            line-height: 1.75;
            max-w-2xl: 600px;
            margin-bottom: 32px;
        }
        .hero-btns {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            border-color: #14b8a6;
            color: #14b8a6;
        }
        .btn-secondary {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
            border: 1px solid #334155;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: #334155;
        }

        /* SEÇÃO TÍTULOS */
        .section-header {
            margin-bottom: 48px;
        }
        .section-tag {
            font-size: 0.75rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2dd4bf;
            margin-bottom: 8px;
        }
        .section-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: -0.025em;
        }

        /* COMPETÊNCIAS BLOCK */

            padding: 96px 0;
            background-color: #020617;
            border-top: 1px solid #1e293b;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            border-color: #14b8a6;
            transform: translateY(-4px);
        }
        .card-num {
            width: 44px;
            height: 44px;
            background-color: rgba(20, 184, 166, 0.1);
            color: #2dd4bf;
            border-radius: 8px;

            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-weight: bold;
            margin-bottom: 24px;
            font-size: 1.15rem;
        }
        .card h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
        }
        .card p {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-tag {
            background-color: #1e293b;
            color: #2dd4bf;
            font-size: 0.75rem;
            font-family: monospace;
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* METRICAS / DESEMPENHO */
        .metrics-section {
            padding: 96px 0;
            background-color: #0f172a;
            border-top: 1px solid #1e293b;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 32px;
        }
        @media (max-width: 500px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
        .metric-card {
            background-color: #020617;
            border: 1px solid #1e293b;
            padding: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        .metric-card img {
            width: 100%;
            max-width: 440px;
            height: auto;
        }

            padding: 96px 0;
            background-color: #020617;
            border-top: 1px solid #1e293b;
        }
        .timeline-wrapper {
            border-left: 2px solid #1e293b;
            padding-left: 32px;
            margin-left: 12px;
            max-width: 800px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 48px;
        }
        .timeline-dot {
            position: absolute;
            left: -41px;
            top: 4px;
            width: 16px;
            height: 16px;
            background-color: #14b8a6;
            border-radius: 50%;
            border: 4px solid #020617;
        }
        .timeline-tag {
            font-size: 0.75rem;
            font-family: monospace;
            color: #2dd4bf;
            background-color: rgba(20, 184, 166, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }
        .timeline-item h3 {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 4px;
            color: #ffffff;
        }
        .timeline-sub {
            font-size: 0.9rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .timeline-desc {
            color: #64748b;
            font-size: 0.92rem;
            line-height: 1.65;
        }

            padding: 96px 0;
            background-color: #0f172a;
            border-top: 1px solid #1e293b;
            text-align: center;
        }
        .contact-desc {
            color: #94a3b8;
            font-size: 0.95rem;
            max-width: 450px;
            margin: 0 auto 40px auto;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
        }
        .contact-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: border-color 0.2s;
        }
        .contact-card:hover {
            border-color: #14b8a6;
